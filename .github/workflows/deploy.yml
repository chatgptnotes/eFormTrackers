name: Deploy JotFlow to IIS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: jotflow-iis-production
  cancel-in-progress: false

jobs:
  deploy:
    # This runner is installed on the IIS host, so deployment never exposes
    # the backend port or copies production secrets through GitHub.
    runs-on: [self-hosted, Windows, X64]
    defaults:
      run:
        shell: powershell
    env:
      APP_ROOT: C:\apps\jotflow

    steps:
      - name: Check out the release
        uses: actions/checkout@v4

      - name: Build the frontend
        working-directory: frontend
        run: |
          $ErrorActionPreference = 'Stop'
          npm ci
          npm run build

      - name: Deploy backend and frontend
        run: |
          $ErrorActionPreference = 'Stop'
          $backendTarget = Join-Path $env:APP_ROOT 'backend'
          $frontendTarget = Join-Path $env:APP_ROOT 'dist'

          foreach ($path in @($env:APP_ROOT, $backendTarget, $frontendTarget)) {
            New-Item -ItemType Directory -Force -Path $path | Out-Null
          }

          # Keep host-specific configuration and user-generated data out of Git.
          robocopy dist $frontendTarget /MIR /R:2 /W:2
          if ($LASTEXITCODE -gt 7) { throw "Frontend copy failed with exit code $LASTEXITCODE" }

          robocopy backend $backendTarget /MIR /XD node_modules uploads logs /XF .env .env.* /R:2 /W:2
          if ($LASTEXITCODE -gt 7) { throw "Backend copy failed with exit code $LASTEXITCODE" }

          if (-not (Test-Path (Join-Path $backendTarget '.env'))) {
            throw "Missing production configuration: $backendTarget\.env"
          }
          foreach ($folder in @('uploads', 'logs')) {
            New-Item -ItemType Directory -Force -Path (Join-Path $backendTarget $folder) | Out-Null
          }

      - name: Install dependencies and migrate database
        working-directory: C:\apps\jotflow\backend
        run: |
          $ErrorActionPreference = 'Stop'
          npm ci --omit=dev
          node db/migrate.js

      - name: Reload JotFlow with PM2
        working-directory: C:\apps\jotflow\backend
        run: |
          $ErrorActionPreference = 'Stop'
          pm2 startOrReload ecosystem.config.js --update-env
          pm2 save

      - name: Verify readiness
        run: |
          $ErrorActionPreference = 'Stop'
          $portLine = Get-Content (Join-Path $env:APP_ROOT 'backend\.env') |
            Where-Object { $_ -match '^\s*PORT\s*=' } |
            Select-Object -First 1
          $port = if ($portLine) { ($portLine -split '=', 2)[1].Trim() } else { '3001' }
          $response = Invoke-WebRequest "http://127.0.0.1:$port/api/health/ready" -UseBasicParsing
          if ($response.StatusCode -ne 200) { throw "Readiness check returned HTTP $($response.StatusCode)" }
